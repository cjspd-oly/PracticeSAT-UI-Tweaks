<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 220px;
        padding: 10px;
        background: #0f172a;
        color: white;
        text-align: center;
      }

      h1 {
        font-size: 14px;
        margin-bottom: 12px;
      }

      h1[data-url] {
        cursor: pointer;
        text-decoration: underline;
        text-decoration-color: #64748b;
      }

      h1[data-url]:hover {
        text-decoration-color: #e2e8f0;
      }

      .toggle {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #1e293b;
        margin-top: 10px;
        padding: 10px;
        border-radius: 10px;
      }

      input {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <h1 data-url="https://github.com/cjspd-oly/PracticeSAT-UI-Tweaks">
      UI Tweaks
    </h1>

    <div class="toggle">
      <span>Hide Difficulty</span>
      <input type="checkbox" id="toggleDifficulty" />
    </div>

    <div class="toggle">
      <span>Stop Blinking</span>
      <input type="checkbox" id="toggleBlink" />
    </div>

    <div class="toggle">
      <span>Better Tables</span>
      <input type="checkbox" id="toggleTables" />
    </div>

    <script src="popup.js"></script>
  </body>
</html>
